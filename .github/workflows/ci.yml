# PR + push CI — the documented pre-PR checklist, automated. Keyless:
# runs the mock-backed e2e only, so forks + no-secret runs stay green.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust (fmt / clippy / test / deny)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (workspace; mock-backed e2e only — no key)
        run: cargo test --workspace

      - name: Core purity guard
        run: cargo test -p leti-core --test core_purity

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Supply-chain — cargo deny
        run: cargo deny check

  tui:
    name: tui (typecheck / test / pack)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tui/package-lock.json
      # opentui-spinner declares a stale @opentui/core peer (^0.1.49) vs the
      # pinned ^0.2.x — benign, but npm ci fails strict peer resolution without
      # this. (The Solid migration author's chosen dep set.)
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --dry-run

  contract-drift:
    name: contract-drift (OpenAPI → types.ts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tui/package-lock.json

      # Build FIRST in its own step so the compile time isn't counted against
      # the health-poll window below (a cold `cargo run` was still compiling
      # past the 60s poll → curl never connected). The boot step then reuses
      # the built artifact and serves within a second.
      - name: Build server binary
        run: cargo build -p leti-server --bin leti-server

      # Boot the server (mock provider, ephemeral) and dump its OpenAPI doc,
      # then regenerate the TS schema and fail if it diverges from the
      # committed copy — prevents the TUI contract-mismatch class of bug.
      - name: Boot server + capture OpenAPI
        run: |
          LETI_BIND=127.0.0.1:8787 \
          LETI_DATA_DIR="$(mktemp -d)" \
            cargo run -p leti-server --bin leti-server -- serve &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8787/v1/health >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8787/doc/openapi.json -o /tmp/openapi.json
          kill "$SERVER_PID" 2>/dev/null || true

      - name: Regenerate TS schema + diff
        working-directory: tui
        run: |
          # No full `npm ci` here — the only tool this step needs is
          # openapi-typescript, fetched on demand. The `tui` job already runs
          # the full install; duplicating it here just to call one binary cost
          # ~1min for nothing.
          npx --yes openapi-typescript /tmp/openapi.json -o src/api/schema.d.ts
          if ! git diff --quiet -- src/api/schema.d.ts; then
            echo "::error::tui/src/api/schema.d.ts is stale vs the server OpenAPI doc. Run 'npm run codegen' and commit."
            git --no-pager diff -- src/api/schema.d.ts
            exit 1
          fi
