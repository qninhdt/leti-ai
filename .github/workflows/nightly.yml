# Nightly + manual real-LLM acceptance. NEVER runs on PRs (cost + secret).
# Gated by vars.LETI_NIGHTLY_ENABLED == 'true' (an Actions variable), so a
# missing variable skips cleanly rather than failing the dashboard.
name: nightly

on:
  schedule:
    # 07:13 UTC — off the top-of-hour to avoid the scheduler stampede.
    - cron: "13 7 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "OpenRouter model id (cheapest by default)"
        required: false
        default: "openai/gpt-4o-mini"

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  live-acceptance:
    name: real-LLM acceptance (gated, cost-bounded)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run when a key is configured — keeps forks + key-less repos green.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.LETI_NIGHTLY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup

      - name: Run gated acceptance suite
        env:
          LETI_LIVE_E2E: "1"
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LETI_LIVE_E2E_MODEL: ${{ github.event.inputs.model || 'openai/gpt-4o-mini' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::OPENAI_API_KEY not set — skipping live acceptance (CI stays green)."
            exit 0
          fi
          # Two-tier scenarios: the env gate (LETI_LIVE_E2E=1 + key) selects
          # the LIVE backend; without it the same tests run mock-backed in ci.yml.
          # No --ignored filter — the scenarios are no longer #[ignore]'d.
          cargo test -p leti-server

      # Evidence is written to gitignored plans/**/evidence/. It is scrubbed
      # at write time by the Phase 12 evidence scrubber (sk- keys, bearer,
      # OPEN{ROUTER,AI}_* assignments, emails) — never raw transcripts.
      - name: Upload scrubbed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-evidence
          path: plans/**/evidence/**
          if-no-files-found: ignore
          retention-days: 7
