# Build the Phase-13 Docker image on merge to main (and tags), then smoke
# the container's healthcheck. Push is gated behind a configured registry —
# without one it builds + smokes only, so the workflow is green out of the box.
name: image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    name: build image + healthcheck smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # GitHub forbids the `secrets` context in step `if:` expressions, so map
    # the registry secret + var into job-level env and gate the push steps on
    # those instead (an unset value is the empty string).
    env:
      REGISTRY: ${{ vars.REGISTRY }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load into local docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: leti-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container healthcheck smoke
        run: |
          # Bind LOOPBACK inside the container and poll /v1/health from inside
          # via `docker exec`. The local profile's dev authenticator refuses a
          # NON-loopback bind by design (H6 fail-closed: a dev auth admits every
          # request as one principal, so it must never face the network). A
          # host-published port would force a 0.0.0.0 bind and trip that gate —
          # so we test the shippable image without weakening the security model.
          # The runtime stage ships curl (for the built-in HEALTHCHECK too).
          docker run -d --name leti-smoke \
            -e LETI_BIND=127.0.0.1:8787 \
            -e LETI_DEFAULT_MODEL=mock/model-small \
            leti-server:ci
          ok=0
          for i in $(seq 1 30); do
            if docker exec leti-smoke curl -fsS http://127.0.0.1:8787/v1/health >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          docker logs leti-smoke || true
          docker rm -f leti-smoke || true
          if [ "$ok" != "1" ]; then
            echo "::error::container failed /v1/health smoke"
            exit 1
          fi

      # Push only when a registry is configured (secrets present). Skipped
      # cleanly otherwise so the default workflow stays green.
      - name: Log in to registry
        if: ${{ env.REGISTRY != '' && env.REGISTRY_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Push image
        if: ${{ env.REGISTRY != '' && env.REGISTRY_TOKEN != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/leti-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
