# cargo-deny config — license + advisory + bans policy.
# Run via `cargo deny check`; gated on every PR by .github/workflows/ci.yml.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Two transitive advisories are ignored with a documented rationale +
# review date. Re-evaluate at each review; drop the ignore once the
# upstream dep migrates. REVIEW BY: 2026-09-01.
ignore = [
    # paste 1.x — unmaintained. Transitive via utoipa-axum's macros.
    # No security impact; expansion-only proc-macro. Drop when utoipa-axum migrates.
    "RUSTSEC-2024-0436",
    # encoding 0.2.x — unmaintained. Transitive via pdf-extract's text decode.
    # No security impact; charset-decode only on operator-supplied PDFs. Drop
    # when pdf-extract migrates off it.
    "RUSTSEC-2021-0153",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate versions of the same crate are flagged. `deny` would fail the
# build on any duplicate in the tree; we keep `warn` because the transitive
# graph legitimately carries a few (e.g. windows-sys majors) we don't
# control — but the CI job surfaces them so a NEW duplicate is visible in
# review rather than silent.
multiple-versions = "warn"
# Forbid wildcard (`*`) version requirements on EXTERNAL crates.io deps —
# a `*` lets a typosquat/unexpected major slip in. Intra-workspace path
# deps legitimately resolve as wildcards, so those stay allowed.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
