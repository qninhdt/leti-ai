# cargo-deny config — license + advisory + bans policy.
# Run via `cargo deny check`. Wired in CI per Phase 8.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # rsa 0.9.x — Marvin timing-sidechannel. No fixed upgrade available.
    # Reaches us only via sqlx's bundled mysql backend, which we never instantiate
    # (SQLite-only). Re-evaluate when rsa publishes a fix.
    "RUSTSEC-2023-0071",
    # paste 1.x — unmaintained. Transitive via utoipa-axum's macros.
    # No security impact; expansion-only proc-macro. Drop when utoipa-axum migrates.
    "RUSTSEC-2024-0436",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
# Workspace path-deps surface as wildcards in cargo-deny; that's expected for
# intra-workspace crates. We only forbid wildcards for external crates.io deps.
wildcards = "allow"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
